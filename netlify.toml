[build]
  command = "npm install --prefix server && npm run build"
  publish = "dist"

[functions]
  directory = "server/netlify-functions"
  node_bundler = "nft"

[functions."api"]
  timeout = 26
  included_files = ["server/node_modules/**"]

# Proxy /api/* to the Netlify Function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/:splat"
  status = 200

# SPA fallback — must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
