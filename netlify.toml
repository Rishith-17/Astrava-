[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  # zisi bundler preserves ESM imports and import.meta correctly
  node_bundler = "zisi"

[functions."api"]
  timeout = 26

# Proxy /api/* to the Netlify Function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/:splat"
  status = 200

# SPA fallback — must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
