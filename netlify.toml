[build]
  command = "node build-function.mjs && npm run build"
  publish = "dist"

[functions]
  directory = "netlify-dist-functions"
  # esbuild sees a pre-bundled CJS file with no imports — passes through cleanly
  node_bundler = "esbuild"

[functions."api"]
  timeout = 26

# Proxy /api/* to the Netlify Function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/:splat"
  status = 200

# SPA fallback — must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
